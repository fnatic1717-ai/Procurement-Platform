name: CI
on: [push, pull_request]

permissions:
  contents: write

jobs:
  foundation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: procurement
          POSTGRES_PASSWORD: procurement_local
          POSTGRES_DB: procurement
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U procurement -d procurement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://procurement:procurement_local@localhost:5432/procurement
      REDIS_URL: redis://localhost:6379
      AUTH_ADAPTER: development
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Commit generated lockfile
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain -- pnpm-lock.yaml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore: generate pnpm lockfile"
            git push
          fi
      - run: pnpm db:migrate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm db:validate
      - run: pnpm audit:deps
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
