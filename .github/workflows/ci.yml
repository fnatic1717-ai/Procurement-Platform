name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: procurement
          POSTGRES_PASSWORD: procurement_local
          POSTGRES_DB: procurement
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U procurement -d procurement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://procurement:procurement_local@localhost:5432/procurement
      REDIS_URL: redis://localhost:6379
      AUTH_ADAPTER: development
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Database migration
        id: migrate
        continue-on-error: true
        run: pnpm db:migrate
      - name: Format check
        id: format
        continue-on-error: true
        run: pnpm format:check
      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck
      - name: Unit tests
        id: test
        continue-on-error: true
        run: pnpm test
      - name: Integration tests
        id: integration
        continue-on-error: true
        run: pnpm test:integration
      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build
      - name: Database validation
        id: dbvalidate
        continue-on-error: true
        run: pnpm db:validate
      - name: Dependency audit
        id: audit
        continue-on-error: true
        run: pnpm audit:deps
      - name: Secret scan
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: Final quality gate
        if: always()
        run: |
          echo "Migration: ${{ steps.migrate.outcome }}"
          echo "Format (non-blocking): ${{ steps.format.outcome }}"
          echo "Lint: ${{ steps.lint.outcome }}"
          echo "Typecheck: ${{ steps.typecheck.outcome }}"
          echo "Unit tests: ${{ steps.test.outcome }}"
          echo "Integration tests: ${{ steps.integration.outcome }}"
          echo "Build: ${{ steps.build.outcome }}"
          echo "Database validation: ${{ steps.dbvalidate.outcome }}"
          echo "Dependency audit: ${{ steps.audit.outcome }}"
          echo "Secret scan: ${{ steps.gitleaks.outcome }}"

          if [ "${{ steps.migrate.outcome }}" != "success" ] || \
             [ "${{ steps.lint.outcome }}" != "success" ] || \
             [ "${{ steps.typecheck.outcome }}" != "success" ] || \
             [ "${{ steps.test.outcome }}" != "success" ] || \
             [ "${{ steps.integration.outcome }}" != "success" ] || \
             [ "${{ steps.build.outcome }}" != "success" ] || \
             [ "${{ steps.dbvalidate.outcome }}" != "success" ] || \
             [ "${{ steps.audit.outcome }}" != "success" ] || \
             [ "${{ steps.gitleaks.outcome }}" != "success" ]; then
            exit 1
          fi
